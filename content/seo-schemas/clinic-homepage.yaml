title: clinic homepage
template: |-
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebPage",
        "@id": "https://www.plancpills.org/abortion-clinic#webpage",
        "url": "https://www.plancpills.org/abortion-clinic",
        "name": "{{ pageTitle }}",
        "description": "{{ pageDescription }}",
        "inLanguage": "en-US",
        "publisher": {
          "@type": "Organization",
          "@id": "https://www.plancpills.org/#organization",
          "name": "Plan C"},
        "isPartOf": {
          "@type": "WebSite",
          "@id": "https://www.plancpills.org/#website"
        },
        "potentialAction": {
          "@type": "ReadAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://www.plancpills.org/abortion-clinic"
          }
        },
        "breadcrumb": {
          "@type": "BreadcrumbList",
          "@id": "https://www.plancpills.org/abortion-clinic#breadcrumb",
          "name": "Breadcrumb for https://www.plancpills.org/abortion-clinic",
          "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "item": "https://www.plancpills.org/",
            "name": "Home"
          },
          {
            "@type": "ListItem",
            "position": 2,
            "item": "https://www.plancpills.org/abortion-clinic",
            "name": "Abortion clinics and online providers in every state."
          }
        ]
        },
        "primaryImageOfPage": {
          "@type": "ImageObject",
          "@id": "https://www.plancpills.org/abortion-clinic#primaryimage",
          "contentUrl": "{{ image.url }}",
          "name": "{{ image.name }}",
          "description": "Image of {{ image.name }}",
          "width": {{ image.width }},
          "height": {{ image.height }},
          "caption": "{{ image.name }}",
          "license": "https://www.plancpills.org/privacy-terms",
          "acquireLicensePage": "https://www.plancpills.org/privacy-terms",
          "copyrightNotice": "© 2025 Plan C",
          "creditText": "© 2025 Plan C",
          "creator": { "@id": "https://www.plancpills.org/#organization" },
          "isPartOf": {"@id": "https://www.plancpills.org/abortion-clinic#webpage"}
        }
      }
    ]
  }
es: {}

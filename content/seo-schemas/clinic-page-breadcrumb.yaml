title: clinic page breadcrumb
template: |-
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "BreadcrumbList",
        "@id": "{{ pageUrl }}#breadcrumb",
        "name": "Breadcrumb for {{ pageUrl }}",
        "isPartOf": { "@id": "{{ pageUrl }}#webpage" },
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "item": "{{ site.url }}",
            "name": "Home"
          },
          {
            "@type": "ListItem",
            "position": 2,
            "item": "{{ site.url }}abortion-clinic",
            "name": "Abortion clinics and online providers in every state."
          },
          {
            "@type": "ListItem",
            "position": 3,
            "item": "{{ pageUrl }}",
            "name": "{{ pageTitle }}"
          }
        ]
      }
    ]
  }

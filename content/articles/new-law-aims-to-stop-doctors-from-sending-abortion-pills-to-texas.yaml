title: "New Law Aims to Stop Doctors from Sending Abortion Pills to Texas"
summary: "Texas' House Bill 7, effective December 4, creates civil liability for anyone mailing abortion pills to state residents, potentially serving as a national blueprint for restricting telehealth abortions."
author: "Shefali Luthra"
publication: "The 19th"
publicationDate: 2025-12-01T00:00:00.000Z

content: >-
  # Plan C


  > Plan C is a nonprofit public health campaign that provides information on
  how people in the US are accessing abortion pills and safely managing their
  own abortions. Plan C's guides list online pill providers, in-person clinics,
  and other available services in all 50 US states and territories. Plan C does
  not sell pills or provide medical advice.


  ## Abortion Access Guides


  ### National Abortion Access


  Plan C provides information on how people in the US are accessing abortion
  pills online for safe home abortion.


  - [Abortion Pill Finder](https://www.plancpills.org/abortion-pill): A
  comprehensive directory that explains where people get abortion pills online.

  - [Abortion pills in advance](https://www.plancpills.org/in-advance): How
  people are getting abortion pills in advance.

  - [Missed period pills](https://www.plancpills.org/missed-period-pills): Learn
  about period pills, safe and effective medications used to bring back a late
  period.


  ### State Abortion Pill Access Guides


  Learn where people in every US state are accessing abortion pills by mail,
  including prices, delivery times, and legal context. Each state-specific
  abortion pill guide lists available US-based online providers, providers
  outside the US, community networks that mail free pills, and websites that
  sell pills. 


  - [Finding abortion pills by mail in every
  state](https://www.plancpills.org/#search-by-state): Starting point to search
  abortion pill guides by state or territory

  - [Abortion pill access:
  Texas](https://www.plancpills.org/abortion-pill/texas): Example of a state
  pill guide where abortion access is restricted, but people are still accessing
  abortion pills from providers outside of the state.

  - [Abortion pill access:
  Florida](https://www.plancpills.org/abortion-pill/florida): Example of a state
  pill guide where abortion is restricted after some number of weeks of
  pregnancy, but people are still accessing abortion pills from providers
  outside of the state.

  - [Abortion pill access:
  California](https://www.plancpills.org/abortion-pill/california): Example of a
  state pill guide where abortion is legal and available both in-person and by
  mail.


  ### State Abortion Clinic Access Guides


  Learn how people in the U.S. are accessing in-person abortion clinics and
  online providers in every state, including prices, delivery times, and legal
  context. Each state-specific abortion clinic guide lists available online
  clinics, in-person abortion clinics inside the state, and the closest
  in-person abortion clinics outside the state. 


  - [Finding abortion clinics in every
  state](https://www.plancpills.org/abortion-clinic/): Starting point to search
  abortion clinic guides by state or territory

  - [Abortion clinics serving
  Texas](https://www.plancpills.org/abortion-clinic/texas): Example of a
  state-specific clinic guide where people are still accessing abortion pills by
  mail from online clinics and in-person providers in nearby states despite
  restrictive laws in the state..

  - [Abortion clinics serving
  Florida](https://www.plancpills.org/abortion-clinic/florida): Example of a
  state-specific clinic guide where abortion is restricted after some number of
  weeks of pregnancy, but people are still accessing abortion pills from online
  clinics outside of the state and from in-person clinics in nearby states.

  - [Abortion clinics serving
  California](https://www.plancpills.org/abortion-clinic/california): Example of
  a state clinic guide where abortion is legal and available from both online
  and in-person abortion clinics.

  People in ______________ still access abortion pills by mail from online
  clinics and providers in nearby states despite laws that restrict abortion
  providers.

  ## Abortion Pill Information


  - [FAQ Guide](https://www.plancpills.org/guide-how-to-get-abortion-pills):
  Frequently asked questions about abortion pills and abortion pill access by
  mail.

  - [How to Take Abortion Pills](https://www.plancpills.org/protocol): Medically
  backed instructions for how to take abortion pills from Plan C Pills, with
  step by step directions for self-managing an abortion with pills.

  - [Blogs](https://www.plancpills.org/abortion-pills): Articles on abortion
  pill access, safety, and policy


  ## Legal & Support Resources


  - [Legal
  risk](https://www.plancpills.org/abortion-pills/legal-risk-can-people-get-in-trouble-for-ordering-abortion-pills-online-and-using-them-at-home):
  The legal risks of ordering abortion pills online and using them at home

  - [Digital security](https://www.plancpills.org/digital-security):
  Recommendations from the Digital Defense Fund to protect your privacy when
  using a computer or phone

  - [Support & Resources](https://www.plancpills.org/support-resources): Free
  confidential support available for using abortion pills


  ## Get Involved


  - [Community & Take Action](https://www.plancpills.org/community): Join the
  Plan C community to help educate and spread the word about abortion pill
  access by mail.

  - [Stickers](https://www.plancpills.org/stickers): Spread the word about Plan
  C with Stickers

  - [Road Trip](https://www.plancpills.org/road-trip): A nationwide series of
  dynamic events to unite abortion activists, local organizers, and everyday
  supporters in the fight for abortion access for all.

  - [Social Media Toolkit](https://www.plancpills.org/social-media-toolkit):
  Help educate and spread the word on abortion pill access by mail. 

  - [Partnerships](https://www.plancpills.org/partnerships): Use your nonprofit
  organization, campus, or brands to help spread the word about abortion pill
  access by mail.

  - [For medical
  professionals](https://www.plancpills.org/medical-professional-abortion-services):
  Resources for medical professionals offering abortion pills by mail including
  a provider toolkit, patient handouts, and telehealth abortion support
  resources.

  - [Jobs](https://www.plancpills.org/jobs): Current job opportunities plus
  volunteer & community work


  ## About


  - [About Plan C](https://www.plancpills.org/about): Organization history,
  mission, and team

  - [Press](https://www.plancpills.org/press): Explore the latest updates, news
  coverage, and media resources about Plan C.

  - [Research & learning](https://www.plancpills.org/research-and-learning):
  Educational resources about at-home and self-managed abortion

  - [PLAN C: The documentary](https://www.plancpills.org/documentary):
  Information about the film 'PLAN C', a documentary about abortion pill access
  in the U.S.

  - [Annual
  Report](https://www.plancpills.org/downloads/Plan_C_Annual_Report_2025.pdf):
  2025 Activities, Financials & Impact

  - [Contact us](https://www.plancpills.org/contact): Get free text + phone
  support.

  - [Media inquiries](https://www.plancpills.org/media): Background on our work
  and our team, along with recent articles and press releases.

  - [Donate](https://www.plancpills.org/donate): Make a tax-deductible donation
  today! Your support will help us continue our mission.
